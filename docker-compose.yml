services:
  postgres:
    image: postgres:17-alpine
    container_name: rinklink-postgres
    environment:
      POSTGRES_DB: rinklink
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./docker/postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d rinklink"]
      interval: 5s
      timeout: 5s
      retries: 20

  backend:
    image: python:3.11-slim
    container_name: rinklink-backend
    working_dir: /workspace/backend
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - ./backend/.env.example
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/rinklink
      MEDIA_ROOT: /workspace/backend/media
      CORS_ORIGINS: http://localhost:5173
      APP_ENV: development
      AUTH_ENABLED: "true"
      AUTH_BYPASS_DEV_ONLY: "false"
      AUTH_JWKS_URL: http://auth-service:3000/.well-known/jwks.json
      AUTH_ISSUER: http://localhost:3000
      AUTH_AUDIENCE: http://localhost:8000
    command: >
      sh -c "pip install --no-cache-dir -r requirements.txt &&
      alembic upgrade head &&
      uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/workspace/backend

  auth-service:
    image: node:20-alpine
    container_name: rinklink-auth-service
    working_dir: /workspace/auth-service
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - ./auth-service/.env.example
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/rinklink?options=-c%20search_path%3Dauth
      BETTER_AUTH_URL: http://localhost:3000
      FRONTEND_URL: http://localhost:5173
      APP_ENV: development
      BETTER_AUTH_SECRET: local-dev-secret-change-this-to-a-long-random-value
    command: >
      sh -c "npm install &&
      npm run dev"
    ports:
      - "3000:3000"
    volumes:
      - ./auth-service:/workspace/auth-service

volumes:
  postgres-data:
