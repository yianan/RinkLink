<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" sizes="16x16" href="/icons/rinklink-icon-16.png" />
    <link rel="icon" type="image/png" sizes="32x32" href="/icons/rinklink-icon-32.png" />
    <link rel="icon" type="image/png" sizes="48x48" href="/icons/rinklink-icon-48.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/icons/rinklink-icon-180.png" />
    <link rel="manifest" href="/site.webmanifest" />
    <meta name="theme-color" content="#062b5f" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>RinkLink</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@500;600;700;800&display=swap" rel="stylesheet" />
    <script>
      (() => {
        try {
          const stored = localStorage.getItem('rinklink.theme');
          const theme = stored === 'dark' || stored === 'light' ? stored : 'dark';
          document.documentElement.classList.toggle('dark', theme === 'dark');
        } catch {
          // ignore
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
