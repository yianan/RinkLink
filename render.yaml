services:
  - type: web
    runtime: docker
    plan: free
    name: rinklink-branch-app
    branch: codex/auth-foundation
    dockerfilePath: ./Dockerfile
    healthCheckPath: /api/health
    envVars:
      - key: APP_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: AUTH_ENABLED
        value: "true"
      - key: AUTH_BYPASS_DEV_ONLY
        value: "false"
      - key: AUTH_REQUIRE_MFA_FOR_PRIVILEGED
        value: "false"
      - key: AUTH_INTERNAL_BASE_URL
        value: http://127.0.0.1:3000
      - key: AUTH_DATABASE_SCHEMA
        value: auth
      - key: API_AUDIENCE
        value: rinklink-api
      - key: AUTH_AUDIENCE
        value: rinklink-api
      - key: EMAIL_FROM_NAME
        value: RinkLink
      - key: EMAIL_FROM_ADDRESS
        sync: false
      - key: BREVO_API_KEY
        sync: false
      - key: BETTER_AUTH_SECRET
        generateValue: true
